services:
    nginx:
        image: nginx:user
        build: ./nginx
        ports:
            - "80:80"
            - "443:443"
        depends_on:
            - front
            - user
            - game
            - logic
        env_file:
            - .env
        networks:
            - transcendence
        restart: always
    front:
        image: front:user
        build: ./front
        expose:
            - "80"
        volumes:
            - .ssl:/usr/src/app/ssl:ro #read-only
        env_file:
            - .env
        networks:
            - transcendence
        restart: always
    user:
        image: user:user
        build: ./sources/user
        ports:
            - "3000:3000"
        volumes:
            - .ssl:/usr/src/app/ssl:ro
        env_file:
            - ./sources/user/.env.user
        networks:
            - transcendence
        restart: unless-stopped
    game:
        image: game:user
        build: ./game
        ports:
            - "3001:3000"
        volumes:
            - .ssl:/usr/src/app/ssl:ro
        env_file:
            - .env
        networks:
            - transcendence
        restart: unless-stopped
    logic:
        image: logic:user
        build: ./logic
        ports:
            - "3002:3000"
        volumes:
            - .ssl:/usr/src/app/ssl:ro
        env_file:
            - .env
        networks:
            - transcendence
        restart: unless-stopped

networks:
    transcendence:
        name: transcendence
